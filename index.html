<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Bajus Finance"/>
  <title>Bajus Family Finances</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #f8fafc; }
    body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; }
    input, select, button, textarea { font-family: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const PRESET_CATEGORIES = [
“Groceries”,“Dining”,“Gas”,“Utilities”,“Rent/Mortgage”,“Insurance”,
“Medical”,“Entertainment”,“Clothing”,“Travel”,“Education”,“Subscriptions”,
“Home & Garden”,“Personal Care”,“Gifts”,“Charity”,“Income”,“Transfer”,“Other”
];
const ACCOUNT_COLORS = [”#16a34a”,”#2563eb”,”#9333ea”,”#dc2626”,”#d97706”,”#0891b2”,”#be185d”,”#65a30d”];
const DEFAULT_BUDGETS = { Groceries:600,Dining:200,Gas:150,Utilities:200,Entertainment:100,Clothing:100,Medical:100,Subscriptions:50 };
const STORAGE_KEY = “checkbook-data-v2”;
const RECUR_FREQS = [“Weekly”,“Bi-weekly”,“Monthly”,“Yearly”];

// ─── Storage ──────────────────────────────────────────────────────────────────
const store = {
async get(key) {
try { if (typeof window.storage?.get===“function”) { const r=await window.storage.get(key); return r?.value??null; } } catch(e) {}
try { return localStorage.getItem(key); } catch(e) { return null; }
},
async set(key,value) {
try { if (typeof window.storage?.set===“function”) { await window.storage.set(key,value); return true; } } catch(e) {}
try { localStorage.setItem(key,value); return true; } catch(e) { return false; }
}
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat(“en-US”,{style:“currency”,currency:“USD”}).format(n);
const today = () => new Date().toISOString().slice(0,10);
const uid = () => Math.random().toString(36).slice(2,10);
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;

function AccountIcon({type, color, size=22}){
const t = (type||””).toLowerCase();
const stroke = color;
const sw = 1.6;
if(t===“credit”) return (
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
<rect x="2" y="5" width="20" height="14" rx="3"/>
<line x1="2" y1="10" x2="22" y2="10"/>
<line x1="6" y1="15" x2="10" y2="15"/>
</svg>
);
if(t===“cash”) return (
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
<rect x="2" y="6" width="20" height="12" rx="2"/>
<circle cx="12" cy="12" r="3"/>
<line x1="6" y1="6" x2="6" y2="18"/>
<line x1="18" y1="6" x2="18" y2="18"/>
</svg>
);
if(t===“investment”||t===“brokerage”||t===“ira”||t===“roth ira”||t===“traditional ira”) return (
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
<polyline points="3 17 8 12 12 15 17 9 21 12"/>
<line x1="3" y1="20" x2="21" y2="20"/>
</svg>
);
if(t===“savings”) return (
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
<path d="M19 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v2"/>
<path d="M3 11v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6a9 9 0 0 0-18 0z"/>
<line x1="12" y1="12" x2="12" y2="16"/>
<line x1="10" y1="14" x2="14" y2="14"/>
</svg>
);
// Default: Checking / bank
return (
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
<polyline points="9 22 9 12 15 12 15 22"/>
</svg>
);
}

function getMonthRange(offset=0) {
const d=new Date(); d.setMonth(d.getMonth()+offset,1);
const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,“0”);
const last=new Date(y,d.getMonth()+1,0).getDate();
return { start:`${y}-${m}-01`, end:`${y}-${m}-${last}`, label:`${d.toLocaleString("default",{month:"short"})} ${y}` };
}

function nextRecurDate(dateStr, freq) {
const d = new Date(dateStr+“T12:00:00”);
if (freq===“Weekly”)    d.setDate(d.getDate()+7);
if (freq===“Bi-weekly”) d.setDate(d.getDate()+14);
if (freq===“Monthly”)   d.setMonth(d.getMonth()+1);
if (freq===“Yearly”)    d.setFullYear(d.getFullYear()+1);
return d.toISOString().slice(0,10);
}

function applyRecurring(data) {
const todayStr=today(), txs=[…data.transactions], recs=(data.recurring||[]).map(r=>({…r}));
let changed=false;
recs.forEach(r=>{
if(!r.active) return;
let next=r.nextDate;
while(next<=todayStr){
txs.push({id:uid(),accountId:r.accountId,date:next,payee:r.payee,category:r.category,amount:r.amount,memo:r.memo||””,cleared:false,createdAt:new Date().toISOString(),createdBy:“Auto (”+r.freq+”)”,recurringId:r.id});
next=nextRecurDate(next,r.freq); changed=true;
}
if(changed) r.nextDate=next;
});
return changed?{…data,transactions:txs,recurring:recs}:data;
}

const emptyState = () => ({
accounts:[
{id:“acc1”,name:“Checking”,type:“Checking”,balance:0,color:ACCOUNT_COLORS[0]},
{id:“acc2”,name:“Savings”,type:“Savings”,balance:0,color:ACCOUNT_COLORS[1]},
],
transactions:[],recurring:[],categories:[…PRESET_CATEGORIES],
budgets:{…DEFAULT_BUDGETS},lastUpdated:null,lastEditor:null,
});

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
const [data,setData]           = useState(null);
const [loading,setLoading]     = useState(true);
const [screen,setScreen]       = useState(“accounts”); // accounts | register | reports | recurring | settings
const [activeAccountId,setActiveAccountId] = useState(null);
const [modal,setModal]         = useState(null);
const [selectedTx,setSelectedTx]   = useState(null);
const [selectedRec,setSelectedRec] = useState(null);
const [userName,setUserName]   = useState(()=>localStorage.getItem(“ck-username”)||””);
const [namePrompt,setNamePrompt] = useState(!localStorage.getItem(“ck-username”));
const [toast,setToast]         = useState(null);
const [reportRange,setReportRange] = useState({start:getMonthRange().start,end:getMonthRange().end});
const [reportTab,setReportTab] = useState(“category”);
const [txFilter,setTxFilter]   = useState(””);
const [backupReminder,setBackupReminder] = useState(()=>{
const last = localStorage.getItem(“ck-last-backup”);
if(!last) return false;
const daysSince = (Date.now()-parseInt(last))/(1000*60*60*24);
return daysSince >= 7;
});

const showToast = useCallback((msg,type=“success”)=>{ setToast({msg,type}); setTimeout(()=>setToast(null),2500); },[]);

const saveData = useCallback(async(newData)=>{
const toSave={…newData,lastUpdated:new Date().toISOString(),lastEditor:userName||“User”};
setData(toSave);
const ok=await store.set(STORAGE_KEY,JSON.stringify(toSave));
if(!ok) showToast(“Save failed”,“error”);
},[userName,showToast]);

const loadData = useCallback(async()=>{
try {
const val=await store.get(STORAGE_KEY);
if(val){
let parsed=JSON.parse(val);
const applied=applyRecurring(parsed);
if(applied!==parsed){ await store.set(STORAGE_KEY,JSON.stringify({…applied,lastUpdated:new Date().toISOString()})); parsed=applied; }
setData(parsed);
} else { setData(emptyState()); }
} catch { setData(emptyState()); }
setLoading(false);
},[]);

useEffect(()=>{ loadData(); },[]);
useEffect(()=>{ const id=setInterval(()=>loadData(),15000); return()=>clearInterval(id); },[loadData]);

const accountBal = useCallback((accId)=>
(data?.transactions||[]).filter(t=>t.accountId===accId).reduce((s,t)=>s+t.amount,(data?.accounts||[]).find(a=>a.id===accId)?.balance||0)
,[data]);

const netWorth = (data?.accounts||[]).reduce((s,a)=>s+accountBal(a.id),0);
const activeAccount = data?.accounts?.find(a=>a.id===activeAccountId);
const payeeMap = (data?.transactions||[]).reduce((m,t)=>{ if(t.payee) m[t.payee]=t.category; return m; },{});

// ── Actions ───────────────────────────────────────────────────────────────
const addTransaction = f => {
const amount=f.type===“expense”?-Math.abs(parseFloat(f.amount)):Math.abs(parseFloat(f.amount));
saveData({…data,transactions:[…data.transactions,{id:uid(),accountId:activeAccountId,date:f.date,payee:f.payee,category:f.category,amount,memo:f.memo||””,cleared:false,createdAt:new Date().toISOString(),createdBy:userName||“User”}]});
showToast(“Transaction added”); setModal(null);
};
const editTransaction = f => {
const amount=f.type===“expense”?-Math.abs(parseFloat(f.amount)):Math.abs(parseFloat(f.amount));
saveData({…data,transactions:data.transactions.map(t=>t.id===selectedTx.id?{…t,…f,amount,updatedAt:new Date().toISOString()}:t)});
showToast(“Updated”); setModal(null); setSelectedTx(null);
};
const deleteTransaction = id => {
saveData({…data,transactions:data.transactions.filter(t=>t.id!==id)});
showToast(“Deleted”,“error”);
};
const toggleCleared = id => saveData({…data,transactions:data.transactions.map(t=>t.id===id?{…t,cleared:!t.cleared}:t)});

const addAccount = f => {
const acc={id:uid(),name:f.name,type:cap(f.type),balance:parseFloat(f.balance)||0,color:ACCOUNT_COLORS[data.accounts.length%ACCOUNT_COLORS.length]};
saveData({…data,accounts:[…data.accounts,acc]}); showToast(“Account added”); setModal(null);
};
const editAccount = f => {
saveData({…data,accounts:data.accounts.map(a=>a.id===activeAccountId?{…a,name:f.name,type:cap(f.type)}:a)});
showToast(“Account updated”); setModal(null);
};
const deleteAccount = () => {
saveData({…data,accounts:data.accounts.filter(a=>a.id!==activeAccountId),transactions:data.transactions.filter(t=>t.accountId!==activeAccountId),recurring:(data.recurring||[]).filter(r=>r.accountId!==activeAccountId)});
showToast(“Account deleted”,“error”); setScreen(“accounts”); setModal(null);
};
const addTransfer = f => {
const amt=Math.abs(parseFloat(f.amount));
const toName=data.accounts.find(a=>a.id===f.toAccount)?.name, fromName=data.accounts.find(a=>a.id===f.fromAccount)?.name;
saveData({…data,transactions:[…data.transactions,
{id:uid(),accountId:f.fromAccount,date:f.date,payee:`Transfer → ${toName}`,category:“Transfer”,amount:-amt,memo:f.memo||””,cleared:false,createdAt:new Date().toISOString(),createdBy:userName||“User”},
{id:uid(),accountId:f.toAccount,  date:f.date,payee:`Transfer ← ${fromName}`,category:“Transfer”,amount:amt, memo:f.memo||””,cleared:false,createdAt:new Date().toISOString(),createdBy:userName||“User”},
]});
showToast(“Transfer added”); setModal(null);
};
const saveRecurring = f => {
const amount=f.type===“expense”?-Math.abs(parseFloat(f.amount)):Math.abs(parseFloat(f.amount));
if(selectedRec){
saveData({…data,recurring:(data.recurring||[]).map(r=>r.id===selectedRec.id?{…r,…f,amount}:r)});
showToast(“Updated”);
} else {
saveData({…data,recurring:[…(data.recurring||[]),{id:uid(),accountId:f.accountId,freq:f.freq,payee:f.payee,category:f.category,amount,memo:f.memo||””,startDate:f.startDate,nextDate:f.startDate,active:true,createdAt:new Date().toISOString()}]});
showToast(“Recurring saved”);
}
setModal(null); setSelectedRec(null);
};
const deleteRecurring = id => {
saveData({…data,recurring:(data.recurring||[]).filter(r=>r.id!==id)});
showToast(“Deleted”,“error”); setModal(null); setSelectedRec(null);
};
const toggleRecurring = id => { saveData({…data,recurring:(data.recurring||[]).map(r=>r.id===id?{…r,active:!r.active}:r)}); setModal(null); setSelectedRec(null); };
const saveBudgets = b => { saveData({…data,budgets:b}); showToast(“Budgets saved”); };
const addCategory = name => { if(!name.trim()||data.categories.includes(name.trim())) return; saveData({…data,categories:[…data.categories,name.trim()]}); showToast(“Category added”); };
const deleteCategory = cat => { if(PRESET_CATEGORIES.includes(cat)){showToast(“Can’t delete preset”,“error”);return;} saveData({…data,categories:data.categories.filter(c=>c!==cat)}); showToast(“Category deleted”,“error”); };
const exportCSV = () => {
const filteredTx=(data?.transactions||[]).filter(t=>t.date>=reportRange.start&&t.date<=reportRange.end);
const rows=[[“Date”,“Account”,“Payee”,“Category”,“Amount”,“Memo”,“Cleared”],…filteredTx.map(t=>{const a=data.accounts.find(x=>x.id===t.accountId);return[t.date,a?.name||””,t.payee,t.category,t.amount.toFixed(2),t.memo,t.cleared?“Y”:“N”];})];
const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
const a=document.createElement(“a”);a.href=“data:text/csv;charset=utf-8,”+encodeURIComponent(csv);a.download=“transactions.csv”;a.click();
showToast(“CSV exported”);
};
const exportJSON = () => {
const a=document.createElement(“a”);a.href=“data:application/json;charset=utf-8,”+encodeURIComponent(JSON.stringify(data,null,2));a.download=`BajusFinance-backup-${today()}.json`;a.click();
localStorage.setItem(“ck-last-backup”, Date.now().toString());
setBackupReminder(false);
showToast(“Backup saved — store in iCloud Drive!”);
};
const importJSON = e => {
const file=e.target.files?.[0]; if(!file) return;
const reader=new FileReader();
reader.onload=ev=>{ try{ const p=JSON.parse(ev.target.result); if(!p.accounts||!p.transactions) throw new Error(); saveData(p); showToast(“Imported”); }catch{ showToast(“Invalid file”,“error”); } };
reader.readAsText(file); e.target.value=””;
};

const importCSV = (file, targetAccountId) => {
const reader = new FileReader();
reader.onload = ev => {
try {
const text = ev.target.result;
const lines = text.split(/\r?\n/).filter(l => l.trim());
// Parse header
const parseRow = row => {
const cols = []; let cur = “”, inQ = false;
for (let ch of row) {
if (ch===’”’) { inQ=!inQ; }
else if (ch===’,’&&!inQ) { cols.push(cur.trim()); cur=””; }
else cur+=ch;
}
cols.push(cur.trim()); return cols;
};
const headers = parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z]/g,””));
const idx = k => headers.indexOf(k);
const dateIdx=idx(“date”), descIdx=idx(“description”), catIdx=idx(“category”),
amtIdx=idx(“amount”), reconIdx=idx(“reconciled”), memoIdx=idx(“memo”);
if(dateIdx===-1||descIdx===-1||amtIdx===-1) throw new Error(“Missing required columns”);
const newTxs = [];
for(let i=1;i<lines.length;i++){
const cols = parseRow(lines[i]);
if(cols.length < 3) continue;
const rawDate = cols[dateIdx]||””;
// Parse DD-MM-YYYY → YYYY-MM-DD
let date = rawDate;
const dmyMatch = rawDate.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
const mdyMatch = rawDate.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})$/);
if(dmyMatch) date = `${dmyMatch[3]}-${dmyMatch[2].padStart(2,"0")}-${dmyMatch[1].padStart(2,"0")}`;
else if(mdyMatch&&!dmyMatch) date = `${mdyMatch[3]}-${mdyMatch[1].padStart(2,"0")}-${mdyMatch[2].padStart(2,"0")}`;
const payee = cols[descIdx]||””;
const category = catIdx>=0 ? (cols[catIdx]||“Other”) : “Other”;
const amount = parseFloat((cols[amtIdx]||“0”).replace(/[^0-9.-+]/g,””));
const memo = memoIdx>=0 ? (cols[memoIdx]||””) : “”;
const cleared = reconIdx>=0 ? cols[reconIdx]===“R” : false;
if(!payee||isNaN(amount)) continue;
newTxs.push({id:uid(),accountId:targetAccountId,date,payee,category,amount,memo,cleared,createdAt:new Date().toISOString(),createdBy:“CSV Import”});
}
if(newTxs.length===0) throw new Error(“No valid transactions found”);
saveData({…data,transactions:[…data.transactions,…newTxs]});
showToast(`Imported ${newTxs.length} transactions`);
} catch(e) { showToast(“Import failed: “+e.message,“error”); }
};
reader.readAsText(file);
};

if(loading) return <div style={S.loader}><div style={S.spin}/></div>;

const openRegister = accId => { setActiveAccountId(accId); setTxFilter(””); setScreen(“register”); };

return (
<div style={S.app}>
{namePrompt && <NameModal onSave={name=>{localStorage.setItem(“ck-username”,name);setUserName(name);setNamePrompt(false);}}/>}
{toast && <div style={{…S.toast,background:toast.type===“error”?”#ef4444”:”#16a34a”}}>{toast.msg}</div>}

```
  {/* ── Accounts Screen ── */}
  {screen==="accounts" && (
    <div style={S.screen}>
      {/* Backup Reminder Banner */}
      {backupReminder&&(
        <div style={S.backupBanner}>
          <span style={S.backupBannerText}>⏰ It's been 7+ days since your last iCloud backup</span>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button style={S.backupBannerBtn} onClick={exportJSON}>Backup Now</button>
            <button style={S.backupBannerDismiss} onClick={()=>{localStorage.setItem("ck-last-backup",Date.now().toString());setBackupReminder(false);}}>Remind Later</button>
          </div>
        </div>
      )}

      {/* Net Worth Hero */}
      <div style={S.netWorthHero}>
        <div style={S.appTitleHero}>Bajus Family Finances</div>
        <div style={S.netWorthLabel}>Net Worth</div>
        <div style={{...S.netWorthAmt, color:"#fff"}}>{fmt(netWorth)}</div>
      </div>

      <DraggableAccountList
        accounts={data.accounts}
        accountBal={accountBal}
        onReorder={accs=>saveData({...data,accounts:accs})}
        onOpen={openRegister}
      />
    </div>
  )}

  {/* ── Register Screen ── */}
  {screen==="register" && activeAccount && (
    <div style={S.screen}>
      <div style={S.topBar}>
        <button style={S.backBtn} onClick={()=>setScreen("accounts")}>‹ Accounts</button>
        <button style={S.topBarTitleBtn} onClick={()=>setModal("editAccount")}>
          {activeAccount.name} <span style={S.editPencil}>✎</span>
        </button>
        <div style={{width:60}}/>
      </div>
      {/* Account balance sub-header */}
      <div style={S.registerHeader}>
        <div style={S.registerBalance}>
          <span style={S.registerBalLabel}>Balance</span>
          <span style={{...S.registerBalAmt,color:accountBal(activeAccountId)<0?"#ef4444":"#16a34a"}}>{fmt(accountBal(activeAccountId))}</span>
        </div>
        <button style={S.transferBtnW} onClick={()=>setModal("transfer")}>⇄ Transfer</button>
      </div>
      <div style={S.searchWrap}>
        <input style={S.searchW} placeholder="Search transactions…" value={txFilter} onChange={e=>setTxFilter(e.target.value)}/>
      </div>
      <div style={S.txListW}>
        {(data.transactions||[])
          .filter(t=>t.accountId===activeAccountId)
          .filter(t=>!txFilter||t.payee.toLowerCase().includes(txFilter.toLowerCase())||t.category.toLowerCase().includes(txFilter.toLowerCase()))
          .sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt))
          .map((tx,i,arr)=>{
            const isLast=i===arr.length-1;
            return (
              <div key={tx.id} style={{...S.txRowW,...(!isLast?{borderBottom:"1px solid #f1f5f9"}:{})}} onClick={()=>{setSelectedTx(tx);setModal("editTx");}}>
                <div style={{...S.txClearedDot,background:tx.cleared?"#16a34a":"#e2e8f0"}} onClick={e=>{e.stopPropagation();toggleCleared(tx.id);}}/>
                <div style={S.txRowBody}>
                  <div style={S.txRowTop}>
                    <span style={S.txRowPayee}>{tx.payee}</span>
                    <span style={{...S.txRowAmt,color:tx.amount>=0?"#16a34a":"#1e293b"}}>{tx.amount>=0?"+":""}{fmt(tx.amount)}</span>
                  </div>
                  <div style={S.txRowBot}>
                    <span style={S.txRowCat}>{tx.category}</span>
                    <span style={S.txRowDate}>{tx.date}</span>
                  </div>
                  {tx.memo&&<div style={S.txRowMemo}>{tx.memo}</div>}
                  {tx.recurringId&&<div style={S.txRowTag}>🔁 Recurring</div>}
                </div>
                <div style={S.txChev}>›</div>
              </div>
            );
          })
        }
        {(data.transactions||[]).filter(t=>t.accountId===activeAccountId).length===0&&(
          <div style={S.emptyW}>No transactions yet.<br/>Tap ＋ to add one.</div>
        )}
      </div>
    </div>
  )}

  {/* ── Reports Screen ── */}
  {screen==="reports" && (
    <ReportsScreen data={data} reportRange={reportRange} setReportRange={setReportRange} reportTab={reportTab} setReportTab={setReportTab} exportCSV={exportCSV}/>
  )}

  {/* ── Recurring Screen ── */}
  {screen==="recurring" && (
    <div style={S.screen}>
      <div style={S.topBar}>
        <span style={S.topBarTitle}>Recurring</span>
        <button style={S.topBarBtn} onClick={()=>{setSelectedRec(null);setModal("recurring");}}>＋</button>
      </div>
      {(data.recurring||[]).length===0&&<div style={S.emptyW}>No recurring transactions.<br/>Add bills or subscriptions.</div>}
      <div style={S.txListW}>

// ─── Draggable Account List ──────────────────────────────────────────────────
function DraggableAccountList({accounts, accountBal, onReorder, onOpen}){
const moveAccount = (id, dir) => {
const arr = […accounts];
const i = arr.findIndex(a=>a.id===id);
const j = i + dir;
if(j < 0 || j >= arr.length) return;
[arr[i], arr[j]] = [arr[j], arr[i]];
onReorder(arr);
};

return (
<div style={S.accountList}>
{accounts.map((a,i)=>{
const bal = accountBal(a.id);
const isLast = i===accounts.length-1;
return (
<div key={a.id} style={{…S.accountRow,…(!isLast?{borderBottom:“1px solid #f1f5f9”}:{})}}>
<div style={S.reorderBtns}>
<button
style={{…S.reorderBtn, opacity: i===0 ? 0.2 : 1}}
disabled={i===0}
onClick={e=>{e.stopPropagation(); moveAccount(a.id,-1);}}
>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
<polyline points="18 15 12 9 6 15"/>
</svg>
</button>
<button
style={{…S.reorderBtn, opacity: isLast ? 0.2 : 1}}
disabled={isLast}
onClick={e=>{e.stopPropagation(); moveAccount(a.id,1);}}
>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
<polyline points="6 9 12 15 18 9"/>
</svg>
</button>
</div>
<div style={{…S.accountRowIcon,background:a.color+“15”}} onClick={()=>onOpen(a.id)}>
<AccountIcon type={a.type} color={a.color} size={20}/>
</div>

</div>
</div>
);
})}
</div>
);
}

// Keep filter sets in sync when accounts/payees change

t.date>=reportRange.start&&t.date<=reportRange.end&&
selAccounts.has(t.accountId)&&
selPayees.has(t.payee)

const spendByCat=filteredTx.reduce((a,t)=>{ if(t.amount<0){const k=t.category||“Other”;a[k]=(a[k]||0)+Math.abs(t.amount);} return a; },{});

const spendByPayee=filteredTx.reduce((a,t)=>{
const k=t.payee||”?”; if(!a[k]) a[k]={expense:0,income:0,accounts:new Set()};

a[k].accounts.add((data?.accounts||[]).find(x=>x.id===t.accountId)?.name||”?”);
return a;
},{});

name:a.name,color:a.color,
spent:filteredTx.filter(t=>t.accountId===a.id&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0),

return (

const filtered=transactions.filter(t=>{
if(q&&!t.payee.toLowerCase().includes(q.toLowerCase())&&!(t.memo||””).toLowerCase().includes(q.toLowerCase())) return false;
if(cat&&t.category!==cat) return false;
if(acct&&t.accountId!==acct) return false;
return true;
}).sort((a,b)=>b.date.localeCompare(a.date));
const total=filtered.reduce((s,t)=>s+t.amount,0);
return (
<div>
<input style={S.searchW} placeholder=“Search payee or memo…” value={q} onChange={e=>setQ(e.target.value)}/>

<select style={{…S.selectW,flex:1}} value={acct} onChange={e=>setAcct(e.target.value)}><option value="">All Accounts</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>

// ─── Amount Input ────────────────────────────────────────────────────────────
// Shows commas while typing, stores raw numeric string underneath
function AmountInput({value, onChange, placeholder=“0.00”, style}){
const [display, setDisplay] = useState(()=>formatAmt(value));

function formatAmt(val){
if(!val && val!==0) return “”;
const str = String(val).replace(/[^0-9.]/g,””);
const parts = str.split(”.”);
const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,”,”);
return parts.length>1 ? intPart+”.”+parts[1] : intPart;
}

const handleChange = e => {
const raw = e.target.value.replace(/[^0-9.]/g,””);
// Only allow one decimal point
const parts = raw.split(”.”);
const cleaned = parts.length>2 ? parts[0]+”.”+parts.slice(1).join(””) : raw;
const formatted = formatAmt(cleaned);
setDisplay(formatted);
onChange(cleaned);
};

// Sync if value changes externally (e.g. on modal open)
useEffect(()=>{ setDisplay(formatAmt(value)); },[value]);

return (
<input
style={style}
type="text"
inputMode="decimal"
placeholder={placeholder}
value={display}
onChange={handleChange}
/>
);
}
